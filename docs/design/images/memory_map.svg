<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1180" viewBox="0 0 900 1180">
  <style>
    .title { font: 700 30px sans-serif; fill: #1f2937; }
    .subtitle { font: 600 16px sans-serif; fill: #4b5563; }
    .label { font: 700 20px sans-serif; fill: #1f2937; }
    .small { font: 15px sans-serif; fill: #374151; }
    .mini { font: 13px sans-serif; fill: #4b5563; }
    .addr { font: 700 17px monospace; fill: #111827; }
    .box { stroke: #374151; stroke-width: 2.5; rx: 14; ry: 14; }
    .thin { stroke: #6b7280; stroke-width: 2; stroke-dasharray: 8 8; }
  </style>

  <rect width="100%" height="100%" fill="#fafaf8"/>
  <text x="44" y="58" class="title">SBC6800 初版メモリマップ</text>
  <text x="44" y="88" class="subtitle">ROM 差し替えだけで起動確認できる構成を優先した、SBC6800 前提の現行案</text>

  <rect x="160" y="120" width="470" height="78" class="box" fill="#f9d9d8"/>
  <text x="188" y="153" class="label">割り込みベクタ</text>
  <text x="188" y="177" class="small">RESET / NMI / SWI / IRQ のベクタを配置</text>
  <text x="665" y="167" class="addr">$FFF8-$FFFF</text>

  <rect x="160" y="210" width="470" height="292" class="box" fill="#fde9b8"/>
  <text x="188" y="245" class="label">ROM 領域</text>
  <text x="188" y="270" class="small">モニタ本体、起動コード、MIKBUG 互換 I/O 入口、将来の CLI を配置</text>
  <text x="665" y="360" class="addr">$E000-$FFFF</text>

  <rect x="200" y="300" width="390" height="86" class="box" fill="#fff5d8"/>
  <text x="225" y="332" class="small">モニタ本体</text>
  <text x="225" y="356" class="mini">ACIA 初期化 / INEEE / OUTEEE / 将来のコマンド処理</text>
  <text x="470" y="348" class="addr">$E000-$FFF7</text>

  <rect x="200" y="396" width="390" height="72" class="box" fill="#fff8e6"/>
  <text x="225" y="428" class="small">ベクタ直前領域</text>
  <text x="225" y="451" class="mini">予約、ジャンプテーブル、将来の小ルーチン向け余白</text>
  <text x="470" y="441" class="addr">$FFF0-$FFF7</text>

  <rect x="160" y="520" width="470" height="170" class="box" fill="#eceff3"/>
  <text x="188" y="555" class="label">未使用 / 拡張領域</text>
  <text x="188" y="580" class="small">将来の周辺、追加 RAM、ビデオ回路、別ボード向け I/O マップ候補</text>
  <text x="665" y="606" class="addr">$8000-$DFFF</text>

  <rect x="210" y="610" width="370" height="50" class="box" fill="#dde8ff"/>
  <text x="233" y="641" class="small">MC6850 ACIA 配置</text>
  <text x="472" y="641" class="addr">$8018-$8019</text>

  <rect x="160" y="710" width="470" height="150" class="box" fill="#e6f3de"/>
  <text x="188" y="745" class="label">拡張領域</text>
  <text x="188" y="770" class="small">追加 RAM や別周辺のための空き。初版では未使用。</text>
  <text x="665" y="777" class="addr">$2000-$7FFF</text>

  <rect x="160" y="880" width="470" height="220" class="box" fill="#d8f1f6"/>
  <text x="188" y="915" class="label">RAM 領域</text>
  <text x="188" y="940" class="small">初版の作業メモリ。最小 8KB 構成で使用する。</text>
  <text x="665" y="970" class="addr">$0000-$1FFF</text>

  <rect x="200" y="974" width="390" height="44" class="box" fill="#eaf8fb"/>
  <text x="225" y="1002" class="mini">入力行バッファ / 16進変換の作業領域 / ローダ一時領域</text>
  <rect x="200" y="1028" width="390" height="44" class="box" fill="#eefbfd"/>
  <text x="225" y="1056" class="mini">スタック / 状態保持 / 将来のレジスタ退避領域</text>

  <rect x="675" y="600" width="165" height="96" class="box" fill="#f8fbff"/>
  <text x="698" y="632" class="small">ACIA レジスタ</text>
  <text x="698" y="659" class="mini">$8018 : control/status</text>
  <text x="698" y="682" class="mini">$8019 : data</text>

  <line x1="655" y1="120" x2="655" y2="1100" class="thin"/>
  <text x="673" y="136" class="mini">高位アドレス</text>
  <text x="673" y="1096" class="mini">低位アドレス</text>

  <rect x="44" y="1116" width="796" height="36" rx="10" ry="10" fill="#f0f4f8" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="62" y="1140" class="mini">方針: SBC6800 既存資産との整合を優先し、ROM = $E000-$FFFF / ACIA = $8018-$8019 / RAM = $0000-$1FFF とする</text>
</svg>
