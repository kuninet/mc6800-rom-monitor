name: Windows Emulator Smoke

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run emulator smoke tests
        run: python tests/test_smoke.py
